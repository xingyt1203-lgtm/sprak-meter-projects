# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/spark_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 让 MyBatis 自动把数据库的下划线字段(user_cluster)映射为 Java 的驼峰命名(userCluster)
mybatis.configuration.map-underscore-to-camel-case=true

# 启动端口
server.port=8080